name: Deploy to GitHub Pages

on:
  # Chạy khi có push lên nhánh main
  push:
    branches: ["main", "master"]

  # Cho phép chạy thủ công từ tab Actions
  workflow_dispatch:

# Quyền hạn cần thiết để deploy lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Tránh việc deploy song song đè lên nhau
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Bước build project
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # Bước deploy lên GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
